# =============================================================================
# SACT Scheduler — nginx reverse proxy with TLS + security headers
# =============================================================================
# Terminates TLS on :443, enforces HSTS, proxies to the app container on
# its internal :1421.  The /metrics + /health/* endpoints are proxied
# through so Prometheus + k8s probes hit nginx (public), not the app
# container (private).
# =============================================================================

worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # --- security-minded log format ----------------------------------------
    log_format main_json escape=json
        '{"ts":"$time_iso8601",'
        '"remote":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"ua":"$http_user_agent",'
        '"rid":"$http_x_request_id"}';

    access_log /var/log/nginx/access.log main_json;
    error_log  /var/log/nginx/error.log  warn;

    # --- block oversized requests ------------------------------------------
    # Match the app's MAX_CONTENT_LENGTH so the 413 fires at the edge.
    client_max_body_size 16M;

    # --- HTTP → HTTPS redirect + tiny healthz --------------------------------
    server {
        listen 80;
        server_name _;

        # nginx's own health probe used by docker-compose healthcheck.
        location = /healthz {
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- main HTTPS server ----------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Modern TLS only.  No TLS 1.0/1.1.
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE+AESGCM:ECDHE+CHACHA20:!aNULL:!MD5:!3DES';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # --- security headers ---------------------------------------------
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff"                              always;
        add_header X-Frame-Options           "DENY"                                 always;
        add_header Referrer-Policy           "no-referrer"                          always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

        # --- proxy to the app --------------------------------------------
        location / {
            proxy_pass         http://app:1421;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            # Pass the request-id through so audit logs correlate end-to-end.
            proxy_set_header   X-Request-ID      $http_x_request_id;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }
    }
}
