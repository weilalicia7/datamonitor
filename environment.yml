# ============================================================================
# SACT Scheduler — conda environment file (§3.7 / Improvement H)
# ============================================================================
#
# Mirror of requirements.txt for conda/mamba users.  Create with:
#
#     conda env create -f environment.yml
#     conda activate sact-scheduler
#     pytest -q tests/
#
# Pins match the Dockerfile's python:3.12-slim base so that a conda
# workstation run and a docker container run produce identical results.
# The four Flask / production-hardening extras (rate-limit, CSRF,
# secrets) are opt-in via pip after activation — kept out of the conda
# layer because they're Flask-only and conda's package index is thinner
# on the Flask ecosystem.
# ============================================================================
name: sact-scheduler
channels:
  - conda-forge
  - defaults
dependencies:
  # ---- language + packaging ----
  - python=3.12
  - pip>=23.0

  # ---- scientific python ----
  - pandas>=2.2.0
  - numpy>=1.26.4
  - scipy>=1.11
  - scikit-learn=1.4.0
  - xgboost=2.0.3
  - joblib=1.3.2
  - matplotlib>=3.8
  - plotly=5.18.0
  - openpyxl=3.1.2
  - xlsxwriter=3.1.9

  # ---- optimisation ----
  - ortools=9.8.3296

  # ---- explainability ----
  - shap=0.44.0

  # ---- NLP ----
  - nltk=3.8.1
  - spacy=3.7.2

  # ---- geo / ingestion ----
  - geopy>=2.4.1
  - requests>=2.32.0
  - urllib3>=2.0.0
  - feedparser>=6.0.10
  - python-dateutil=2.8.2
  - pytz=2024.1

  # ---- dashboard + mapping ----
  - folium=0.15.1

  # ---- pip-only packages (thin coverage on conda-forge) ----
  - pip:
    - streamlit>=1.39.0
    - streamlit-folium==0.17.0
    - vaderSentiment==3.3.2
    - Flask>=3.0.0
    - Flask-Login>=0.6.3
    - Flask-WTF>=1.2.1
    - Flask-Limiter>=3.5.0
    - python-dotenv>=1.0.0
    - prometheus_client>=0.20.0
    - pytest>=7.4.0
    - pytest-timeout>=2.2.0
